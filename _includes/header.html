<header class="d-flex flex-column flex-md-row align-items-center pb-1 mb-2 border-bottom">
  <div>
    <span class="fs-5 fw-bold">{{ site.title }}</span>
  </div>
  <nav class="d-inline-flex mt-2 mt-md-0 ms-md-auto ">
    {% for item in site.data.settings.menu %}
    <a class="me-3 py-2 fw-bold " href="{{ item.url }}" target="_blank" style="color: #393939;">{{ item.name }}</a>
    {% endfor %}  
  </nav>
</header>
