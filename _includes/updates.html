<div class="row g-5 mb-5">
  <div>
    <h5 class="fw-bold border-bottom pb-3 mb-5">Updates</h3>
    {% if page.title == "Home" %}
      {% for item in site.data.updates.index limit:3 %}
          <p>{{item}}</p>
      {% endfor %}
      {% if site.data.updates.index.size > 3 %}
          <button class="button-80" id="loadMore" onclick="loadMore()" role="button">Load More</button>
          <div id="hiddenUpdates" style="display: none;">
              {% for item in site.data.updates.index offset:3 %}
                  <p>{{item}}</p>
              {% endfor %}
          </div>
      {% endif %}
    {% endif %}
  </div>
</div>

<script>
function loadMore() {
  var x = document.getElementById("hiddenUpdates");
  if (x.style.display === "none") {
      x.style.display = "block";
  } else {
      x.style.display = "none";
  }
}
</script>

<style>
.button-80 {
background: #fff;
backface-visibility: hidden;
border-radius: .375rem;
border-style: solid;
border-width: .125rem;
box-sizing: border-box;
color: #212121;
cursor: pointer;
display: inline-block;
font-family: Circular,Helvetica,sans-serif;
font-size: 0.8rem;
font-weight: 300;
letter-spacing: -.01em;
line-height: 1.3;
padding: 0.3rem 0.5rem;
position: relative;
text-align: left;
text-decoration: none;
transform: translateZ(0) scale(1);
transition: transform .2s;
user-select: none;
-webkit-user-select: none;
touch-action: manipulation;
}

.button-80:not(:disabled):hover {
transform: scale(1.05);
}

.button-80:not(:disabled):hover:active {
transform: scale(1.05) translateY(.125rem);
}

.button-80:focus {
outline: 0 solid transparent;
}

.button-80:focus:before {
content: "";
left: calc(-1*.375rem);
pointer-events: none;
position: absolute;
top: calc(-1*.375rem);
transition: border-radius;
user-select: none;
}

.button-80:focus:not(:focus-visible) {
outline: 0 solid transparent;
}

.button-80:focus:not(:focus-visible):before {
border-width: 0;
}

.button-80:not(:disabled):active {
transform: translateY(.125rem);
}
</style>
